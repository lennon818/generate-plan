<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Space Grotesk', sans-serif;

  background-image: url("https://images.unsplash.com/photo-1582582429416-4b4f7c9b7c74");
  background-size: cover;
  background-position: center;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.15);
}

/* branding */
.branding {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) rotate(-2deg);

  background: #f4e7c5;
  padding: 10px 30px;

  font-family: 'Permanent Marker', cursive;
  font-size: 18px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* layout */
.scene {
  display: flex;
  flex-wrap: wrap;
  gap: 60px;
  justify-content: center;
  padding: 100px 40px;
}

/* stack */
.polaroid-stack {
  position: relative;
}

/* main polaroid */
.polaroid {
  width: 280px;
  height: 340px;
  background: white;
  padding: 12px 12px 50px 12px;

  box-shadow:
    0 35px 70px rgba(0,0,0,0.35),
    0 10px 20px rgba(0,0,0,0.2);

  transform: rotate(-2deg);
}

/* back layers */
.back1, .back2 {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
}

.back1 {
  top: 6px;
  left: 6px;
  transform: rotate(2deg);
  z-index: -1;
}

.back2 {
  top: 12px;
  left: 12px;
  transform: rotate(-1deg);
  z-index: -2;
}

/* photo area */
.photo {
  width: 100%;
  height: 240px;
  background: black;
  padding: 12px;
  box-sizing: border-box;

  color: white;
  font-weight: 700;
  font-size: 17px;
  line-height: 1.6;

  overflow: auto;
}

/* textarea */
textarea {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  color: white;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
}

/* label */
.label {
  font-family: 'Permanent Marker', cursive;
  font-size: 14px;
  text-align: center;
  margin-top: 10px;
}

/* button */
.generate-container {
  text-align: center;
  margin: 40px 0;
}

.generate-action {
  display: inline-block;
  background: white;
  padding: 10px 20px;
  border: 1px solid black;
  font-family: 'Permanent Marker', cursive;
  cursor: pointer;
  transform: rotate(-1deg);
}
</style>

</head>

<body>

<div class="branding">PAYAM EMRANI</div>

<div class="scene">

  <div class="polaroid-stack">
    <div class="polaroid">
      <div class="photo">
        <textarea placeholder="Enter notes..."></textarea>
      </div>
      <div class="label">NOTES</div>
    </div>
    <div class="polaroid back1"></div>
    <div class="polaroid back2"></div>
  </div>

  <div class="polaroid-stack">
    <div class="polaroid">
      <div class="photo" id="overview"></div>
      <div class="label">OVERVIEW</div>
    </div>
    <div class="polaroid back1"></div>
    <div class="polaroid back2"></div>
  </div>

  <div class="polaroid-stack">
    <div class="polaroid">
      <div class="photo" id="tasks"></div>
      <div class="label">TASKS</div>
    </div>
    <div class="polaroid back1"></div>
    <div class="polaroid back2"></div>
  </div>

</div>

<div class="generate-container">
  <div class="generate-action" id="generateBtn">
    GENERATE PLAN
  </div>
</div>

<script>
window.onload = function () {

  document.getElementById("generateBtn").onclick = function () {

    document.getElementById("overview").innerHTML =
      "1. Structured shoot overview<br>2. Creative direction defined";

    document.getElementById("tasks").innerHTML =
      "1. Prep<br>2. Shoot<br>3. Wrap";

  };

};
</script>

</body>
</html>
